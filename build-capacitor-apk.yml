name: Build NexaTrade Capacitor APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Capacitor project
        run: |
          mkdir -p capacitor-app/www
          cd capacitor-app

          # Copy ALL app files (html, css, js, icons, manifest) into www/
          cp -r $GITHUB_WORKSPACE/*.html www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/*.js www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/*.css www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/*.json www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/icons www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/screenshots www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/assets www/ 2>/dev/null || true

          # Make sure there's an index.html
          ls www/

          # package.json
          cat > package.json << 'PKG'
          {
            "name": "nexatrade",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/android": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          PKG

          npm install

          # capacitor.config.json
          cat > capacitor.config.json << 'CONFIG'
          {
            "appId": "io.github.yakut23.nexatrade",
            "appName": "NexaTrade",
            "webDir": "www",
            "bundledWebRuntime": false,
            "backgroundColor": "#06060d",
            "android": {
              "allowMixedContent": true
            },
            "server": {
              "androidScheme": "https"
            }
          }
          CONFIG

          npx cap add android

      - name: Set app icons
        run: |
          cd capacitor-app
          sudo apt-get install -y imagemagick -q
          curl -L "https://yakut23.github.io/nexa-app/icons/icon-512.png" -o /tmp/icon.png

          ANDROID_RES="android/app/src/main/res"
          for size in xxxhdpi:192 xxhdpi:144 xhdpi:96 hdpi:72 mdpi:48; do
            density="${size%%:*}"
            px="${size##*:}"
            mkdir -p "$ANDROID_RES/mipmap-$density"
            convert /tmp/icon.png -resize ${px}x${px} "$ANDROID_RES/mipmap-$density/ic_launcher.png"
            convert /tmp/icon.png -resize ${px}x${px} "$ANDROID_RES/mipmap-$density/ic_launcher_round.png"
            convert /tmp/icon.png -resize ${px}x${px} "$ANDROID_RES/mipmap-$density/ic_launcher_foreground.png"
          done

      - name: Sync Capacitor
        run: |
          cd capacitor-app
          npx cap sync android

      - name: Enable Display Cutout in styles.xml
        run: |
          python3 << 'INNEREOF'
          import os, glob

          # Find styles.xml
          files = glob.glob("capacitor-app/android/**/styles.xml", recursive=True)
          for path in files:
              with open(path, 'r') as f:
                  styles = f.read()

              # Add cutout item inside AppTheme style if not already there
              cutout_item = '        <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>'
              if 'windowLayoutInDisplayCutoutMode' not in styles:
                  styles = styles.replace(
                      '</style>',
                      cutout_item + '\n    </style>',
                      1  # only first occurrence (AppTheme)
                  )
                  with open(path, 'w') as f:
                      f.write(styles)
                  print(f"Updated: {path}")
              else:
                  print(f"Already has cutout: {path}")
          INNEREOF

      - name: Adjust WebView text zoom
        run: |
          MAIN_ACTIVITY=$(find capacitor-app/android -name "MainActivity.java")
          echo "Found: $MAIN_ACTIVITY"
          cat "$MAIN_ACTIVITY"

          python3 << 'PYEOF'
          import glob

          files = glob.glob("capacitor-app/android/**/MainActivity.java", recursive=True)
          path = files[0]

          with open(path, 'r') as f:
              content = f.read()

          # Add import if not present
          if "android.webkit.WebView" not in content:
              content = content.replace(
                  "import com.getcapacitor.BridgeActivity;",
                  "import com.getcapacitor.BridgeActivity;\nimport android.webkit.WebView;\nimport android.os.Bundle;"
              )

          # Add imports if not present
          if "android.webkit.WebSettings" not in content:
              content = content.replace(
                  "import com.getcapacitor.BridgeActivity;",
                  "import com.getcapacitor.BridgeActivity;\nimport android.webkit.WebSettings;\nimport android.view.WindowManager;\nimport android.view.View;\nimport android.graphics.Color;"
              )

          # Add onCreate override with cutout + WebView fixes
          if "onCreate" not in content:
              content = content.replace(
                  "public class MainActivity extends BridgeActivity {",
                  """public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // ===== CAMERA CUTOUT (DISPLAY CUTOUT) SUPPORT =====
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.P) {
                      android.view.WindowManager.LayoutParams lp = getWindow().getAttributes();
                      lp.layoutInDisplayCutoutMode =
                          android.view.WindowManager.LayoutParams.LAYOUT_IN_DISPLAY_CUTOUT_MODE_SHORT_EDGES;
                      getWindow().setAttributes(lp);
                  }

                  // Draw behind status bar so safe-area-inset-top works in WebView
                  getWindow().setStatusBarColor(android.graphics.Color.TRANSPARENT);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE |
                      View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                  );

                  // WebView settings
                  android.webkit.WebView webView = (android.webkit.WebView) this.bridge.getWebView();
                  android.webkit.WebSettings settings = webView.getSettings();
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);
              }
          """
              )

          with open(path, 'w') as f:
              f.write(content)

          print("Updated:")
          print(content)
          PYEOF

      - name: Restore fixed Keystore
        run: |
          echo "" | base64 -d > capacitor-app/nexatrade.keystore

      - name: Build APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/capacitor-app/nexatrade.keystore \
            -Pandroid.injected.signing.store.password=nexatrade123 \
            -Pandroid.injected.signing.key.alias=nexatrade \
            -Pandroid.injected.signing.key.password=nexatrade123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-App
          path: capacitor-app/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
