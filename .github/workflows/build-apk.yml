name: Build NexaTrade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone TWA Quickstart template
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa
          cd twa
          ls

      - name: Configure TWA for NexaTrade
        run: |
          cd twa
          # Update app/build.gradle
          cat > app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'

          android {
              compileSdkVersion 34
              defaultConfig {
                  applicationId "io.github.yakut23.nexatrade"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          GRADLE

          # Update strings.xml
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">NexaTrade</string>
              <string name="launcherName">NexaTrade</string>
              <string name="hostName">yakut23.github.io</string>
              <string name="launchUrl">https://yakut23.github.io/nexa-app/</string>
              <string name="assetStatements">
                  [{\"relation\": [\"delegate_permission/common.handle_all_urls\"],
                  \"target\": {\"namespace\": \"web\",
                  \"site\": \"https://yakut23.github.io\"}}]
              </string>
          </resources>
          XML

          # Update colors
          cat > app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#06060d</color>
              <color name="colorPrimaryDark">#06060d</color>
              <color name="colorAccent">#00e5a0</color>
              <color name="backgroundColor">#06060d</color>
          </resources>
          XML

      - name: Download and set icons
        run: |
          sudo apt-get install -y imagemagick -q
          curl -L "https://yakut23.github.io/nexa-app/icons/icon-512.png" -o /tmp/icon.png

          for size in xxxhdpi:192 xxhdpi:144 xhdpi:96 hdpi:72 mdpi:48; do
            density="${size%%:*}"
            px="${size##*:}"
            mkdir -p twa/app/src/main/res/mipmap-$density
            convert /tmp/icon.png -resize ${px}x${px} \
              twa/app/src/main/res/mipmap-$density/ic_launcher.png
            echo "Created $density ${px}px icon"
          done

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore nexatrade.keystore \
            -alias nexatrade \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nexatrade123 \
            -keypass nexatrade123 \
            -dname "CN=NexaTrade,O=GermTech,C=TZ"

      - name: Build APK
        working-directory: twa
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/nexatrade.keystore \
            -Pandroid.injected.signing.store.password=nexatrade123 \
            -Pandroid.injected.signing.key.alias=nexatrade \
            -Pandroid.injected.signing.key.password=nexatrade123

      - name: Rename APK
        run: |
          find twa -name "*.apk" -exec cp {} NexaTrade.apk \;
          ls -la NexaTrade.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-APK
          path: NexaTrade.apk
          if-no-files-found: error
