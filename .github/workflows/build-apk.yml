name: Build NexaTrade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create TWA Project Structure
        run: |
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-mdpi
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/gradle/wrapper

          # Download and resize icons
          sudo apt-get install -y imagemagick -q
          curl -L "https://yakut23.github.io/nexa-app/icons/icon-192.png" -o /tmp/icon.png
          convert /tmp/icon.png -resize 192x192 twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 144x144 twa/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 96x96   twa/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 72x72   twa/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon.png -resize 48x48   twa/app/src/main/res/mipmap-mdpi/ic_launcher.png

          # strings.xml
          cat > twa/app/src/main/res/values/strings.xml << 'XML'
          <resources>
            <string name="app_name">NexaTrade</string>
          </resources>
          XML

          # colors.xml
          cat > twa/app/src/main/res/values/colors.xml << 'XML'
          <resources>
            <color name="colorPrimary">#06060d</color>
            <color name="colorPrimaryDark">#06060d</color>
            <color name="colorAccent">#00e5a0</color>
          </resources>
          XML

          # AndroidManifest.xml
          cat > twa/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:theme="@android:style/Theme.NoTitleBar">
              <activity
                  android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                  android:exported="true">
                <meta-data
                    android:name="android.support.customtabs.trusted.DEFAULT_URL"
                    android:value="https://yakut23.github.io/nexa-app/" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https"
                        android:host="yakut23.github.io"
                        android:pathPrefix="/nexa-app/"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          XML

          # settings.gradle (new syntax)
          cat > twa/settings.gradle << 'GRADLE'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "NexaTrade"
          include(":app")
          GRADLE

          # Root build.gradle (new syntax)
          cat > twa/build.gradle << 'GRADLE'
          plugins {
            id("com.android.application") version "8.2.0" apply false
          }
          GRADLE

          # App build.gradle (new syntax)
          cat > twa/app/build.gradle << 'GRADLE'
          plugins {
            id("com.android.application")
          }
          android {
            namespace = "io.github.yakut23.nexatrade"
            compileSdk = 34
            defaultConfig {
              applicationId = "io.github.yakut23.nexatrade"
              minSdk = 21
              targetSdk = 34
              versionCode = 1
              versionName = "1.0.0"
            }
            buildTypes {
              release {
                isMinifyEnabled = false
              }
            }
            compileOptions {
              sourceCompatibility = JavaVersion.VERSION_17
              targetCompatibility = JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation("androidx.browser:browser:1.7.0")
            implementation("com.google.androidbrowserhelper:androidbrowserhelper:2.5.0")
          }
          GRADLE

          # gradle wrapper properties
          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore twa/nexatrade.keystore \
            -alias nexatrade \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nexatrade123 \
            -keypass nexatrade123 \
            -dname "CN=NexaTrade,O=GermTech,C=TZ"

      - name: Build APK
        working-directory: twa
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleRelease --warning-mode none

      - name: Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -r | head -1)
          $APKSIGNER sign \
            --ks twa/nexatrade.keystore \
            --ks-key-alias nexatrade \
            --ks-pass pass:nexatrade123 \
            --key-pass pass:nexatrade123 \
            --out twa/NexaTrade.apk \
            twa/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-APK
          path: twa/NexaTrade.apk
          if-no-files-found: error
