name: Build NexaTrade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          mkdir -p twa/app/src/main/java/io/github/yakut23/nexatrade
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-mdpi
          mkdir -p twa/gradle/wrapper

          # settings.gradle
          cat > twa/settings.gradle << 'GRADLE'
          include ':app'
          GRADLE

          # Root build.gradle
          cat > twa/build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          GRADLE

          # gradle.properties
          cat > twa/gradle.properties << 'GRADLE'
          android.useAndroidX=true
          android.enableJetifier=true
          GRADLE

          # gradle wrapper
          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          # App build.gradle
          cat > twa/app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'

          android {
              namespace 'io.github.yakut23.nexatrade'
              compileSdkVersion 33

              defaultConfig {
                  applicationId "io.github.yakut23.nexatrade"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.browser:browser:1.5.0'
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          GRADLE

          # AndroidManifest.xml
          cat > twa/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.AppCompat.NoActionBar">

                  <meta-data
                      android:name="asset_statements"
                      android:resource="@string/asset_statements" />

                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:label="@string/app_name">

                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="@string/launch_url" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:resource="@color/colorPrimary" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data
                              android:scheme="https"
                              android:host="@string/host_name"
                              android:pathPrefix="/nexa-app/"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          # strings.xml
          cat > twa/app/src/main/res/values/strings.xml << 'XML'
          <resources>
              <string name="app_name">NexaTrade</string>
              <string name="host_name">yakut23.github.io</string>
              <string name="launch_url">https://yakut23.github.io/nexa-app/</string>
              <string name="asset_statements">
                  [{\"relation\": [\"delegate_permission/common.handle_all_urls\"], \"target\": {\"namespace\": \"web\", \"site\": \"https://yakut23.github.io\"}}]
              </string>
          </resources>
          XML

          # colors.xml
          cat > twa/app/src/main/res/values/colors.xml << 'XML'
          <resources>
              <color name="colorPrimary">#06060d</color>
              <color name="colorPrimaryDark">#06060d</color>
              <color name="colorAccent">#00e5a0</color>
          </resources>
          XML

          # styles.xml
          cat > twa/app/src/main/res/values/styles.xml << 'XML'
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="android:Theme.Material.Light.NoActionBar">
              </style>
          </resources>
          XML

      - name: Set icons
        run: |
          sudo apt-get install -y imagemagick -q
          curl -L "https://yakut23.github.io/nexa-app/icons/icon-512.png" -o /tmp/icon.png
          for size in xxxhdpi:192 xxhdpi:144 xhdpi:96 hdpi:72 mdpi:48; do
            density="${size%%:*}"
            px="${size##*:}"
            convert /tmp/icon.png -resize ${px}x${px} \
              twa/app/src/main/res/mipmap-$density/ic_launcher.png
          done

      - name: Generate Gradle Wrapper Jar
        run: |
          mkdir -p /tmp/wrapper-gen
          cd /tmp/wrapper-gen
          touch settings.gradle
          gradle wrapper --gradle-version 7.6.1 --distribution-type bin
          cp -r gradle "$GITHUB_WORKSPACE/twa/"
          cp gradlew "$GITHUB_WORKSPACE/twa/"
          cp gradlew.bat "$GITHUB_WORKSPACE/twa/"
          chmod +x "$GITHUB_WORKSPACE/twa/gradlew"

      - name: Restore fixed Keystore
        run: |
          echo "" | base64 -d > nexatrade.keystore

      - name: Build APK
        working-directory: twa
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/nexatrade.keystore \
            -Pandroid.injected.signing.store.password=nexatrade123 \
            -Pandroid.injected.signing.key.alias=nexatrade \
            -Pandroid.injected.signing.key.password=nexatrade123 \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-APK
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
