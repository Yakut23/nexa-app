name: Build NexaTrade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node & Bubblewrap
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Bubblewrap config
        run: |
          JAVA_PATH=$(readlink -f $(which java))
          JAVA_HOME_DIR=$(dirname $(dirname $JAVA_PATH))
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' \
            "$JAVA_HOME_DIR" \
            "$ANDROID_SDK_ROOT" > ~/.bubblewrap/config.json
          echo "Config:"
          cat ~/.bubblewrap/config.json

      - name: Init Bubblewrap with expect
        run: |
          sudo apt-get install -y expect -q
          mkdir -p twa
          cd twa
          expect << 'EXPECT'
          set timeout 120
          spawn bubblewrap init --manifest="https://yakut23.github.io/nexa-app/manifest.json" --directory=.
          expect "Do you want Bubblewrap to install" { send "n\r" }
          expect "Domain:" { send "yakut23.github.io\r" }
          expect "URL path:" { send "/nexa-app/\r" }
          expect "Application name:" { send "NexaTrade\r" }
          expect "short name:" { send "NexaTrade\r" }
          expect "Application version:" { send "1\r" }
          expect "version name:" { send "1.0.0\r" }
          expect "icon URL:" { send "https://yakut23.github.io/nexa-app/icons/icon-512.png\r" }
          expect "maskable" { send "https://yakut23.github.io/nexa-app/icons/icon-512-maskable.png\r" }
          expect "monochrome" { send "\r" }
          expect "Display mode" { send "\r" }
          expect "orientation" { send "\r" }
          expect "theme color" { send "#06060d\r" }
          expect "background" { send "#06060d\r" }
          expect "start URL" { send "/nexa-app/\r" }
          expect "package id" { send "io.github.yakut23.nexatrade\r" }
          expect "key path" { send "android.keystore\r" }
          expect "key alias" { send "nexatrade\r" }
          expect eof
          EXPECT

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore twa/android.keystore \
            -alias nexatrade \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nexatrade123 \
            -keypass nexatrade123 \
            -dname "CN=NexaTrade,O=GermTech,C=TZ"

      - name: Build APK
        working-directory: twa
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-APK
          path: |
            twa/app-release-signed.apk
            twa/**/*.apk
          if-no-files-found: warn
