name: Build NexaTrade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17 (for SDK manager)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone TWA template
        run: git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa

      - name: Configure NexaTrade
        run: |
          cd twa

          cat > app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">NexaTrade</string>
              <string name="launcherName">NexaTrade</string>
              <string name="hostName">yakut23.github.io</string>
              <string name="launchUrl">https://yakut23.github.io/nexa-app/</string>
              <string name="assetStatements">
                  [{\"relation\": [\"delegate_permission/common.handle_all_urls\"],
                  \"target\": {\"namespace\": \"web\",
                  \"site\": \"https://yakut23.github.io\"}}]
              </string>
          </resources>
          XML

          cat > app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#06060d</color>
              <color name="colorPrimaryDark">#06060d</color>
              <color name="colorAccent">#00e5a0</color>
          </resources>
          XML

          # Update package name in build.gradle
          sed -i 's/applicationId .*/applicationId "io.github.yakut23.nexatrade"/' app/build.gradle
          cat app/build.gradle

      - name: Set icons
        run: |
          sudo apt-get install -y imagemagick -q
          curl -L "https://yakut23.github.io/nexa-app/icons/icon-512.png" -o /tmp/icon.png
          for size in xxxhdpi:192 xxhdpi:144 xhdpi:96 hdpi:72 mdpi:48; do
            density="${size%%:*}"
            px="${size##*:}"
            mkdir -p twa/app/src/main/res/mipmap-$density
            convert /tmp/icon.png -resize ${px}x${px} \
              twa/app/src/main/res/mipmap-$density/ic_launcher.png
          done

      - name: Upgrade Gradle wrapper
        working-directory: twa
        run: |
          # Replace old gradle wrapper with version 7.6 (supports Java 17, compatible AGP 7.x)
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.1-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          # Update top-level build.gradle to AGP 7.4.2
          cat build.gradle
          sed -i "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:7.4.2/" build.gradle
          cat build.gradle

          # Update compileSdkVersion / targetSdkVersion in app/build.gradle
          sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion 33/" app/build.gradle
          sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion 33/" app/build.gradle
          cat app/build.gradle

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore nexatrade.keystore \
            -alias nexatrade \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nexatrade123 \
            -keypass nexatrade123 \
            -dname "CN=NexaTrade,O=GermTech,C=TZ"

      - name: Build APK
        working-directory: twa
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/nexatrade.keystore \
            -Pandroid.injected.signing.store.password=nexatrade123 \
            -Pandroid.injected.signing.key.alias=nexatrade \
            -Pandroid.injected.signing.key.password=nexatrade123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-APK
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
