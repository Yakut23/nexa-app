name: Build NexaTrade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'MANIFEST'
          {
            "packageId": "io.github.yakut23.nexatrade",
            "host": "yakut23.github.io",
            "name": "NexaTrade Pro",
            "launcherName": "NexaTrade",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#06060d",
            "themeColorDark": "#06060d",
            "navigationColor": "#06060d",
            "navigationColorDark": "#06060d",
            "navigationDividerColor": "#06060d",
            "navigationDividerColorDark": "#06060d",
            "backgroundColor": "#06060d",
            "enableNotifications": false,
            "startUrl": "/nexa-app/",
            "iconUrl": "https://yakut23.github.io/nexa-app/icons/icon-512.png",
            "maskableIconUrl": "https://yakut23.github.io/nexa-app/icons/icon-512-maskable.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "android.keystore",
              "alias": "nexatrade"
            },
            "splashScreenFadeOutDuration": 300,
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://yakut23.github.io/nexa-app/manifest.json",
            "fallbackType": "webview",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": false,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "minSdkVersion": 21,
            "shortcuts": []
          }
          MANIFEST

      - name: Configure Bubblewrap to skip JDK install
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'CONFIG'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin_jdk/17.0.14-7/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          CONFIG

      - name: Init TWA project
        run: |
          mkdir -p twa
          cp twa-manifest.json twa/twa-manifest.json
          cd twa
          echo "n" | bubblewrap init --manifest=../twa-manifest.json --directory=.

      - name: Generate signing key
        run: |
          keytool -genkey -v \
            -keystore twa/android.keystore \
            -alias nexatrade \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nexatrade123 \
            -keypass nexatrade123 \
            -dname "CN=NexaTrade,O=GermTech,C=TZ"

      - name: Build APK
        working-directory: twa
        run: echo "n" | bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-APK
          path: |
            twa/app-release-signed.apk
            twa/**/*.apk
          if-no-files-found: warn
