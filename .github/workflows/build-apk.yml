name: Build NexaTrade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Configure Bubblewrap JDK path
        run: |
          JAVA_HOME_PATH=$(dirname $(dirname $(readlink -f $(which java))))
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME_PATH\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Init TWA project
        run: |
          mkdir -p twa
          cd twa
          echo "n" | bubblewrap init \
            --manifest="https://yakut23.github.io/nexa-app/manifest.json" \
            --directory=.

      - name: Generate signing key
        run: |
          keytool -genkey -v \
            -keystore twa/android.keystore \
            -alias nexatrade \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nexatrade123 \
            -keypass nexatrade123 \
            -dname "CN=NexaTrade,O=GermTech,C=TZ"

      - name: Update signing key in config
        working-directory: twa
        run: |
          cat twa-manifest.json | \
          sed 's|"path": ".*keystore"|"path": "android.keystore"|' | \
          sed 's|"storePassword": ".*"|"storePassword": "nexatrade123"|' | \
          sed 's|"keyPassword": ".*"|"keyPassword": "nexatrade123"|' \
          > twa-manifest-signed.json
          mv twa-manifest-signed.json twa-manifest.json

      - name: Build APK
        working-directory: twa
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-APK
          path: |
            twa/app-release-signed.apk
            twa/**/*.apk
          if-no-files-found: warn
