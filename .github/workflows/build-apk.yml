name: Build NexaTrade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create TWA Android Project
        run: |
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-mdpi
          mkdir -p twa/app/src/main/res/values

          # Download icon
          curl -L "https://yakut23.github.io/nexa-app/icons/icon-192.png" -o /tmp/icon.png

          # Resize icons
          sudo apt-get install -y imagemagick -q
          convert /tmp/icon.png -resize 192x192 twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 144x144 twa/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 96x96  twa/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 72x72  twa/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon.png -resize 48x48  twa/app/src/main/res/mipmap-mdpi/ic_launcher.png

          # strings.xml
          cat > twa/app/src/main/res/values/strings.xml << 'XML'
          <resources>
            <string name="app_name">NexaTrade</string>
            <string name="launcherName">NexaTrade</string>
            <string name="hostName">yakut23.github.io</string>
            <string name="launchUrl">/nexa-app/</string>
            <string name="assetStatements">
              [{\"relation\": [\"delegate_permission/common.handle_all_urls\"],
              \"target\": {\"namespace\": \"web\", \"site\": \"https://yakut23.github.io\"}}]
            </string>
          </resources>
          XML

          # colors.xml
          cat > twa/app/src/main/res/values/colors.xml << 'XML'
          <resources>
            <color name="colorPrimary">#06060d</color>
            <color name="colorPrimaryDark">#06060d</color>
            <color name="colorAccent">#00e5a0</color>
          </resources>
          XML

      - name: Create AndroidManifest.xml
        run: |
          mkdir -p twa/app/src/main
          cat > twa/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="io.github.yakut23.nexatrade">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:theme="@android:style/Theme.NoTitleBar">
              <activity
                  android:name="android.support.customtabs.trusted.LauncherActivity"
                  android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                    android:value="https://yakut23.github.io/nexa-app/" />
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="yakut23.github.io" android:pathPrefix="/nexa-app/"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          XML

      - name: Create build.gradle files
        run: |
          # Project build.gradle
          cat > twa/build.gradle << 'GRADLE'
          buildscript {
            repositories {
              google()
              mavenCentral()
            }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.1.0'
            }
          }
          allprojects {
            repositories {
              google()
              mavenCentral()
            }
          }
          GRADLE

          # settings.gradle
          echo "include ':app'" > twa/settings.gradle

          # App build.gradle
          cat > twa/app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
            compileSdkVersion 34
            defaultConfig {
              applicationId "io.github.yakut23.nexatrade"
              minSdkVersion 21
              targetSdkVersion 34
              versionCode 1
              versionName "1.0.0"
            }
            buildTypes {
              release {
                minifyEnabled false
              }
            }
            namespace "io.github.yakut23.nexatrade"
          }
          dependencies {
            implementation 'androidx.browser:browser:1.5.0'
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          GRADLE

          # gradle wrapper
          mkdir -p twa/gradle/wrapper
          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore twa/nexatrade.keystore \
            -alias nexatrade \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nexatrade123 \
            -keypass nexatrade123 \
            -dname "CN=NexaTrade,O=GermTech,C=TZ"

      - name: Build APK
        working-directory: twa
        run: |
          chmod +x gradlew 2>/dev/null || true
          gradle wrapper
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks twa/nexatrade.keystore \
            --ks-key-alias nexatrade \
            --ks-pass pass:nexatrade123 \
            --key-pass pass:nexatrade123 \
            --out twa/NexaTrade.apk \
            twa/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-APK
          path: twa/NexaTrade.apk
          if-no-files-found: error
