name: Build NexaTrade Capacitor APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Capacitor project
        run: |
          mkdir -p capacitor-app/www
          cd capacitor-app

          # Copy ALL app files (html, css, js, icons, manifest) into www/
          cp -r $GITHUB_WORKSPACE/*.html www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/*.js www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/*.css www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/*.json www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/icons www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/screenshots www/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/assets www/ 2>/dev/null || true

          # Make sure there's an index.html
          ls www/

          # package.json
          cat > package.json << 'PKG'
          {
            "name": "nexatrade",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/android": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          PKG

          npm install

          # capacitor.config.json
          cat > capacitor.config.json << 'CONFIG'
          {
            "appId": "io.github.yakut23.nexatrade",
            "appName": "NexaTrade",
            "webDir": "www",
            "bundledWebRuntime": false,
            "backgroundColor": "#06060d",
            "android": {
              "allowMixedContent": true
            },
            "server": {
              "androidScheme": "https"
            }
          }
          CONFIG

          npx cap add android

      - name: Set app icons
        run: |
          cd capacitor-app
          sudo apt-get install -y imagemagick -q
          curl -L "https://yakut23.github.io/nexa-app/icons/icon-512.png" -o /tmp/icon.png

          ANDROID_RES="android/app/src/main/res"
          for size in xxxhdpi:192 xxhdpi:144 xhdpi:96 hdpi:72 mdpi:48; do
            density="${size%%:*}"
            px="${size##*:}"
            mkdir -p "$ANDROID_RES/mipmap-$density"
            convert /tmp/icon.png -resize ${px}x${px} "$ANDROID_RES/mipmap-$density/ic_launcher.png"
            convert /tmp/icon.png -resize ${px}x${px} "$ANDROID_RES/mipmap-$density/ic_launcher_round.png"
            convert /tmp/icon.png -resize ${px}x${px} "$ANDROID_RES/mipmap-$density/ic_launcher_foreground.png"
          done

      - name: Sync Capacitor
        run: |
          cd capacitor-app
          npx cap sync android

      - name: Restore fixed Keystore
        run: |
          echo "" | base64 -d > capacitor-app/nexatrade.keystore

      - name: Build APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/capacitor-app/nexatrade.keystore \
            -Pandroid.injected.signing.store.password=nexatrade123 \
            -Pandroid.injected.signing.key.alias=nexatrade \
            -Pandroid.injected.signing.key.password=nexatrade123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexaTrade-App
          path: capacitor-app/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
